name: Generate Streak Stats

on:
  schedule:
    - cron: "0 0 * * *"   # Runs every day at 00:00 UTC
  push:
    paths:
      - ".github/workflows/streak-stats.yml"
  workflow_dispatch: {}   # Lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate streak stats SVG
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          options: user=Abodzaa&theme=dark&disable_animations=true
          path: profile/streak.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit streak stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/streak.svg
          git commit -m "chore: update streak stats [skip ci]" || exit 0
          git push
