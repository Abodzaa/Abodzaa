name: Auto Update README

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Runs once a day even if you don't push anything,
    # so the README always looks "alive".
    - cron: '0 0 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update "Last updated" timestamp
        run: |
          NOW=$(TZ="Africa/Cairo" date '+%Y-%m-%d %H:%M %Z')
          sed -i "s|<!-- LAST-UPDATED:START -->.*|<!-- LAST-UPDATED:START -->|" README.md
          sed -i "/<!-- LAST-UPDATED:START -->/,/<!-- LAST-UPDATED:END -->/c\\<!-- LAST-UPDATED:START -->\n🕒 Last updated: ${NOW}\n<!-- LAST-UPDATED:END -->" README.md

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: auto-update README [skip ci]"
          git push
